<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>
    <link rel="stylesheet" type="text/css" href="listaa.css" media="screen" />
    <link rel="stylesheet" type="text/css" href="logocss.css" media="screen" />
    <script>
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        if (!isLoggedIn) {
            window.location.href = "https://matheusfonsecabjj.github.io/login/";
        }
    </script>
    <style>
        .filter-icon {
            cursor: pointer;
            margin-left: 5px;
            color: #007BFF;
        }
        .dropdown-filter {
            display: none;
            position: absolute;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 100;
            max-height: 150px;
            overflow-y: auto;
            padding: 5px;
            border: 1px solid #ccc;
        }
        .dropdown-filter input {
            margin: 5px 0;
        }
        .filter-container {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="menu">
            <a href="https://matheusfonsecabjj.github.io/home/">Home</a>
            <a href="https://matheusfonsecabjj.github.io/entrada/">Entrada</a>
            <a href="https://matheusfonsecabjj.github.io/saida/">Saída</a>
            <a href="https://matheusfonsecabjj.github.io/lista/">Listagem</a>
            <a href="https://matheusfonsecabjj.github.io/mapa/">Mapeamento</a>
        </div>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.querySelector('nav .menu');
            menu.classList.toggle('active');
        }
    </script>

    <h2>Lista de Produtos</h2>
    <table id="tabelaProdutos">
        <thead>
            <tr>
                <th>Código <span class="filter-icon" onclick="toggleFilter('codigo')">🔽</span></th>
                <th>Produto <span class="filter-icon" onclick="toggleFilter('produto')">🔽</span></th>
                <th>Cor <span class="filter-icon" onclick="toggleFilter('cor')">🔽</span></th>
                <th>Espessura <span class="filter-icon" onclick="toggleFilter('espessura')">🔽</span></th>
                <th>Peso <span class="filter-icon" onclick="toggleFilter('peso')">🔽</span></th>
                <th>SKU <span class="filter-icon" onclick="toggleFilter('sku')">🔽</span></th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <!-- Dados serão carregados aqui -->
        </tbody>
    </table>

    <div id="dropdown-filters" class="dropdown-filter"></div>

    <script>
        let activeFilterColumn = null;

        function carregarProdutos() {
            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const corpoTabela = document.getElementById('corpoTabela');
            corpoTabela.innerHTML = '';

            produtos.forEach(produto => {
                const linha = document.createElement('tr');
                linha.innerHTML = `
                    <td>${produto.codigo}</td>
                    <td>${produto.produto}</td>
                    <td>${produto.cor}</td>
                    <td>${produto.espessura}</td>
                    <td>${produto.peso}</td>
                    <td>${produto.sku}</td>
                    <td>
                        <button class="edit-btn" onclick="editarProduto('${produto.sku}')">Editar</button>
                        <button onclick="confirmarExclusao('${produto.sku}')">Excluir</button>
                    </td>
                `;
                corpoTabela.appendChild(linha);
            });
        }

        function confirmarExclusao(sku) {
            const confirmacao = confirm('Tem certeza que deseja excluir este produto?');
            if (confirmacao) {
                excluirProduto(sku);
            }
        }

        function excluirProduto(sku) {
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            produtos = produtos.filter(produto => produto.sku !== sku);
            localStorage.setItem('produtos', JSON.stringify(produtos));
            carregarProdutos();
        }

        function editarProduto(sku) {
            window.location.href = `https://matheusfonsecabjj.github.io/editar/?sku=${sku}`;
        }

        function toggleFilter(column) {
            const dropdown = document.getElementById('dropdown-filters');
            if (activeFilterColumn === column) {
                dropdown.style.display = 'none';
                activeFilterColumn = null;
                return;
            }
            activeFilterColumn = column;

            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const uniqueValues = [...new Set(produtos.map(produto => produto[column]))];

            dropdown.innerHTML = uniqueValues.map(value => `
                <label>
                    <input type="checkbox" value="${value}" onchange="aplicarFiltro('${column}')"> ${value}
                </label>
            `).join('');

            dropdown.style.display = 'block';
        }

        function aplicarFiltro(column) {
            const checkboxes = document.querySelectorAll('#dropdown-filters input[type="checkbox"]');
            const valoresFiltrados = Array.from(checkboxes)
                .filter(checkbox => checkbox.checked)
                .map(checkbox => checkbox.value);

            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const produtosFiltrados = produtos.filter(produto => valoresFiltrados.includes(produto[column]));

            const corpoTabela = document.getElementById('corpoTabela');
            corpoTabela.innerHTML = '';

            produtosFiltrados.forEach(produto => {
                const linha = document.createElement('tr');
                linha.innerHTML = `
                    <td>${produto.codigo}</td>
                    <td>${produto.produto}</td>
                    <td>${produto.cor}</td>
                    <td>${produto.espessura}</td>
                    <td>${produto.peso}</td>
                    <td>${produto.sku}</td>
                    <td>
                        <button class="edit-btn" onclick="editarProduto('${produto.sku}')">Editar</button>
                        <button onclick="confirmarExclusao('${produto.sku}')">Excluir</button>
                    </td>
                `;
                corpoTabela.appendChild(linha);
            });
        }

        window.onload = carregarProdutos;
    </script>
</body>
</html>
