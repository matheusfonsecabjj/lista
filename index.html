<head>
    <meta charset="UTF-8">

        const isLoggedIn = localStorage.getItem("isLoggedIn");

    <style>
        .filter-icon {
            cursor: pointer;
            margin-left: 5px;
            color: white; /* Ícone branco */
        }

        .dropdown-filter {
            display: none;
            position: absolute;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: left;
        }

        .dropdown-filter input[type="text"] {
            width: calc(70% - 10px);
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .dropdown-filter button {
            margin-left: 10px;
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .dropdown-filter button:hover {
            background-color: #0056b3;
        }

        .dropdown-filter label {
            display: block; /* Exibe cada opção como linha */
            margin-bottom: 5px;
        }

        .dropdown-filter input[type="checkbox"] {
            margin-right: 10px;
        }

        /* Estilo para a área do título e o botão de gerar relatório */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #generateReportBtn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #generateReportBtn:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

            <img src="logo.png" alt="Logo">

    <div class="header-container">
        <h2>Lista de Produtos</h2>
        <button id="generateReportBtn" onclick="gerarRelatorio()">Gerar Relatório</button>
    </div>

    <table id="tabelaProdutos">
        <thead>
            <tr>
                <th>Código <span class="filter-icon" onclick="toggleFilter('codigo', event)">&#x25BC;</span></th>
                <th>Produto <span class="filter-icon" onclick="toggleFilter('produto', event)">&#x25BC;</span></th>
                <th>Cor <span class="filter-icon" onclick="toggleFilter('cor', event)">&#x25BC;</span></th>
                <th>Espessura <span class="filter-icon" onclick="toggleFilter('espessura', event)">&#x25BC;</span></th>
                <th>Peso <span class="filter-icon" onclick="toggleFilter('peso', event)">&#x25BC;</span></th>
                <th>SKU <span class="filter-icon" onclick="toggleFilter('sku', event)">&#x25BC;</span></th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <!-- Dados serão carregados aqui -->
        </tbody>
    </table>

    <div id="dropdown-filters" class="dropdown-filter">
        <input type="text" id="filterSearch" placeholder="Buscar..." onkeyup="filtrarOpcoes()">
        <button onclick="selecionarTodos()">Selecionar Todos</button>
        <div id="filterOptions"></div>
    </div>

    <script>
        let activeFilterColumn = null;

        function carregarProdutos() {
            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const corpoTabela = document.getElementById('corpoTabela');
            corpoTabela.innerHTML = '';

            produtos.forEach(produto => {
                const linha = document.createElement('tr');
                linha.innerHTML = `
                    <td>${produto.codigo}</td>
                    <td>${produto.produto}</td>
                    <td>${produto.cor}</td>
                    <td>${produto.espessura}</td>
                    <td>${produto.peso}</td>
                    <td>${produto.sku}</td>
                    <td>
                        <button class="edit-btn" onclick="editarProduto('${produto.sku}')">Editar</button>
                        <button onclick="confirmarExclusao('${produto.sku}')">Excluir</button>
                    </td>
                `;
                corpoTabela.appendChild(linha);
            });
        }

        function confirmarExclusao(sku) {
            const confirmacao = confirm('Tem certeza que deseja excluir este produto?');
            if (confirmacao) {
                excluirProduto(sku);
            }
        }

        function excluirProduto(sku) {
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            produtos = produtos.filter(produto => produto.sku !== sku);
            localStorage.setItem('produtos', JSON.stringify(produtos));
            carregarProdutos();
        }

        function editarProduto(sku) {
            window.location.href = `https://matheusfonsecabjj.github.io/editar/?sku=${sku}`;
        }

        function toggleFilter(column, event) {
            const dropdown = document.getElementById('dropdown-filters');
            const rect = event.target.getBoundingClientRect();

            if (activeFilterColumn === column) {
                dropdown.style.display = 'none';
                activeFilterColumn = null;
                return;
            }
            activeFilterColumn = column;

            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const uniqueValues = [...new Set(produtos.map(produto => produto[column]))];

            const filterOptions = document.getElementById('filterOptions');
            filterOptions.innerHTML = uniqueValues.map(value => `
                <label>
                    <input type="checkbox" value="${value}" onchange="aplicarFiltro('${column}')"> ${value}
                </label>
            `).join('');

            dropdown.style.display = 'block';
            dropdown.style.left = `${rect.left}px`;
            dropdown.style.top = `${rect.bottom + window.scrollY}px`;
        }

        function filtrarOpcoes() {
            const termo = document.getElementById('filterSearch').value.toLowerCase();
            const labels = document.querySelectorAll('#filterOptions label');

            labels.forEach(label => {
                const texto = label.textContent.toLowerCase();
                label.style.display = texto.includes(termo) ? 'block' : 'none';
            });
        }

        function aplicarFiltro(column) {
            const checkboxes = document.querySelectorAll('#filterOptions input[type="checkbox"]');
            const valoresFiltrados = Array.from(checkboxes)
                .filter(checkbox => checkbox.checked)
                .map(checkbox => checkbox.value);

            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const produtosFiltrados = produtos.filter(produto => valoresFiltrados.includes(produto[column]));

            const corpoTabela = document.getElementById('corpoTabela');
            corpoTabela.innerHTML = '';

            produtosFiltrados.forEach(produto => {
                const linha = document.createElement('tr');
                linha.innerHTML = `
                    <td>${produto.codigo}</td>
                    <td>${produto.produto}</td>
                    <td>${produto.cor}</td>
                    <td>${produto.espessura}</td>
                    <td>${produto.peso}</td>
                    <td>${produto.sku}</td>
                    <td>
                        <button class="edit-btn" onclick="editarProduto('${produto.sku}')">Editar</button>
                        <button onclick="confirmarExclusao('${produto.sku}')">Excluir</button>
                    </td>
                `;
                corpoTabela.appendChild(linha);
            });
        }

        function selecionarTodos() {
            const checkboxes = document.querySelectorAll('#filterOptions input[type="checkbox"]');
            checkboxes.forEach(checkbox => checkbox.checked = true);
            aplicarFiltro(activeFilterColumn);  // Aplica o filtro automaticamente
        }

        function gerarRelatorio() {
            const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            const ws = XLSX.utils.json_to_sheet(produtos);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Produtos");
            XLSX.writeFile(wb, "relatorio_produtos.xlsx");
        }

        window.onload = carregarProdutos;
